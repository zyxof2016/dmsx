components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        请求头 `Authorization: Bearer <JWT>`。路径 `/v1/tenants/{tenant_id}/...` 中的 `{tenant_id}` 必须属于该 JWT 允许的租户集合：声明 **`tenant_id`**（UUID，默认/主租户）与可选数组 **`allowed_tenant_ids`**（UUID）；有效集合为 **`tenant_id` ∪ `allowed_tenant_ids`**。若省略或 `allowed_tenant_ids` 为空，则仅允许 **`tenant_id`**（与旧版「单租户」令牌一致）。切换租户时由客户端改用新的 `{tenant_id}` 路径前缀；签发方（IdP/BFF）负责在成员关系变化时更新 `allowed_tenant_ids`。

        **按租户角色**：可选对象 **`tenant_roles`**（JSON 中键为租户 UUID 字符串，值为角色名字符串数组）。对每次请求取**活动租户**（有路径租户时为路径 `{tenant_id}`，否则为 JWT 的 `tenant_id`）：若 `tenant_roles` 含该租户键则仅用该数组做 RBAC（空数组表示该租户无角色）；若无键则回退到令牌级 **`roles`**。

        `GET /v1/config/livekit` 需 **PlatformAdmin** 角色（与 `dmsx-api` RBAC 一致）。

        本地开发可将 `DMSX_API_AUTH_MODE` 设为 `disabled` 跳过校验。
  responses:
    Unauthorized:
      description: 未认证或 JWT 无效（RFC 7807）
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: 已认证但权限不足或租户不匹配（RFC 7807）
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: 资源不存在（RFC 7807）
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    BadRequest:
      description: 请求校验失败（DmsxError::Validation → HTTP 400；Problem Details 的 title 为 "Bad Request"，RFC 7807）
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Conflict:
      description: 资源冲突（DmsxError::Conflict → HTTP 409；如唯一约束、幂等键冲突，RFC 7807）
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    InternalServerError:
      description: 服务器内部错误（DmsxError::Internal → HTTP 500；RFC 7807）
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  parameters:
    TenantId:
      name: tenant_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrgId:
      name: org_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SiteId:
      name: site_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DeviceId:
      name: device_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PolicyId:
      name: policy_id
      in: path
