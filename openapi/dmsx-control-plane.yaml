      schema:
        type: string
        format: uuid
    CommandId:
      name: command_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    DevicePlatform:
      type: string
      description: Device OS family (serde snake_case)
      enum:
      - windows
      - linux
      - macos
      - ios
      - android
      - edge
      - other
