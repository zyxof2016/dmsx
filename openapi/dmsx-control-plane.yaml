openapi: 3.1.0
info:
  title: DMSX Control Plane API
  version: 0.1.0
  description: |
    集控 DMS 控制面 REST（与 `crates/dmsx-api` 路由对齐）。

    已覆盖：健康检查、**租户创建**、**组织/站点/设备组创建**、租户统计、设备 CRUD 与列表筛选、设备影子、远控动作、设备维度命令历史、租户命令列表与生命周期、策略 CRUD 与发布 revision、**制品列表/创建**、**合规发现列表**、LiveKit 配置、远程桌面会话、AI 四类接口。

    ---

    ## 数据面 gRPC（说明）

    本 OpenAPI 仅描述**控制面 HTTP**（`dmsx-api`）契约；设备长连接数据面由 `dmsx-device-gw` 提供 **gRPC**（`proto/dmsx/agent.proto`，包名 `dmsx.agent.v1`，服务 `AgentService`），不在本 OpenAPI 的 `paths` 中展开。

    **认证与身份**：生产建议启用 **mTLS**（网关配置 `DMSX_GW_TLS_CLIENT_CA`）。在 mTLS 严格模式下，客户端证书 SAN 必须包含 URI `urn:dmsx:tenant:{uuid}:device:{uuid}`，网关以证书为准校验每个 RPC 中的 `device_id`（及显式 `tenant_id`，若携带）与证书一致。为支持设备首证签发，若同时配置了 Enroll 所需 HMAC/CA，握手层会允许匿名新设备连入并仅调用 `Enroll`；其余 RPC 仍需设备证书。`UploadEvidence` 因无显式 `tenant_id`，当前要求通过设备证书或 `upload_token` 推导租户。

    **JetStream 命令与回执**：
    - 命令下发：控制面在命令写入 Postgres 并提交后异步发布到 NATS JetStream，subject `dmsx.command.{tenant_id}.{device_id}`（stream 默认 `DMSX_COMMANDS`，subjects `dmsx.command.>`）。
    - 设备拉取：网关当前对同一 `{tenant_id, device_id}` 仅允许一个活跃 `StreamCommands` 流，并按“发出一条命令 -> 等对应 `ReportResult(command_id)` 发布成功 -> ACK JetStream -> 再发下一条”串行推进。
    - 回执入库：网关将命令执行结果发布到 `dmsx.command.result.{tenant_id}.{device_id}`；控制面以 durable pull consumer 消费（默认 `DMSX_NATS_RESULT_CONSUMER=dmsx-api-result-ingest`）并与 `POST /v1/tenants/{tid}/commands/{cid}/result` 语义对齐写库。
    - 证据上传：`UploadEvidence` 当前写入 S3 / MinIO 兼容对象存储；对象 key 由网关生成并通过 `ReportResult.evidence_object_key` 回传控制面。

    **认证**：根级 `security: [bearerAuth]`；`/health` 与 `/ready` 使用 `security: []`。JWT 可选 **`allowed_tenant_ids`**（路径租户白名单）与可选 **`tenant_roles`**（按租户覆盖 RBAC，见 `components.securitySchemes.bearerAuth`）。开发环境可将 `DMSX_API_AUTH_MODE=disabled` 关闭校验。

    **错误**：多数操作声明 `401` / `403`；资源不存在声明 `404`。带请求体的写操作声明 **`400`**（`DmsxError::Validation` → HTTP 400，Problem Details 的 title 为 **Bad Request**；**当前实现不使用 422**）。部分创建类 POST 另声明 **`409`**（`DmsxError::Conflict`）。**`500`**（`DmsxError::Internal` 等未预期故障）在各操作声明。上述响应均复用 `ProblemDetails` schema。

    **`POST /v1/tenants`** 与 **`GET /v1/config/livekit`** 同级 RBAC：需 **PlatformAdmin**（`jwt` 模式）。其余层级创建路径需 **TenantAdmin**（或更高）且路径 `{tenant_id}` 在 JWT 许可集合内。
servers:
- url: https://api.example.com
security:
- bearerAuth: []
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: dmsx-api
        '500':
          $ref: '#/components/responses/InternalServerError'
  /ready:
    get:
      summary: Readiness check
      operationId: readinessCheck
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: dmsx-api
                  auth:
                    type: object
        '503':
          description: Not ready
        '500':
          $ref: '#/components/responses/InternalServerError'
  /metrics:
    get:
      summary: Prometheus metrics
      operationId: metrics
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants:
    post:
      summary: Create tenant (platform)
      operationId: createTenant
      description: |
        创建新租户（服务端生成 `id`）。`jwt` 模式下与 `GET /v1/config/livekit` 相同，仅 **PlatformAdmin** 可写；`disabled` 模式下不校验。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantReq'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/orgs:
    post:
      summary: Create organization under tenant
      operationId: createOrg
      parameters:
      - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHierarchyNamedReq'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/orgs/{org_id}/sites:
    post:
      summary: Create site under org
      operationId: createSite
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/OrgId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHierarchyNamedReq'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/sites/{site_id}/groups:
    post:
      summary: Create device group under site
      operationId: createGroup
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/SiteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHierarchyNamedReq'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/devices:
    get:
      summary: List devices
      operationId: listDevices
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - name: limit
        in: query
        description: Page size (clamped 1–200, default 50)
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      - name: offset
        in: query
        description: Zero-based offset (default 0)
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: search
        in: query
        schema:
          type: string
      - name: platform
        in: query
        schema:
          $ref: '#/components/schemas/DevicePlatform'
      - name: enroll_status
        in: query
        schema:
          $ref: '#/components/schemas/EnrollStatus'
      - name: online_state
        in: query
        schema:
          $ref: '#/components/schemas/OnlineState'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseDevice'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create / provision device (admin)
      operationId: createDevice
      parameters:
      - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceReq'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/devices/{device_id}:
    get:
      summary: Get device
      operationId: getDevice
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: Update device (labels, groups, etc.)
      operationId: patchDevice
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeviceReq'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete or revoke device
      operationId: deleteDevice
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/DeviceId'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/stats:
    get:
      summary: Dashboard aggregate stats for tenant
      operationId: getTenantStats
      parameters:
      - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/devices/{device_id}/shadow:
    get:
      summary: Get device shadow (reported / desired / delta)
      operationId: getDeviceShadow
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShadowResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/devices/{device_id}/shadow/desired:
    patch:
      summary: Update desired shadow state (admin)
      operationId: patchShadowDesired
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShadowDesiredReq'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShadowResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/devices/{device_id}/shadow/reported:
    patch:
      summary: Update reported shadow state (typically agent heartbeat)
      operationId: patchShadowReported
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShadowReportedReq'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShadowResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/devices/{device_id}/actions:
    post:
      summary: Enqueue remote-control action as a command (convenience API)
      operationId: createDeviceAction
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceActionReq'
      responses:
        '202':
          description: Accepted — new command enqueued for device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Command'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/devices/{device_id}/commands:
    get:
      summary: List commands targeting this device
      operationId: listDeviceCommands
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/DeviceId'
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/CommandStatus'
      - name: target_device_id
        in: query
        description: Optional filter; when set should match path `device_id`
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponseCommand'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/policies:
    get:
      summary: List policies
      operationId: listPolicies
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: search
        in: query
        schema:
          type: string
      - name: scope_kind
        in: query
        schema:
          $ref: '#/components/schemas/PolicyScopeKind'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponsePolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create policy
      operationId: createPolicy
      parameters:
      - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyReq'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/policies/{policy_id}:
    get:
      summary: Get single policy
      operationId: getPolicy
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/PolicyId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: Update policy
      operationId: patchPolicy
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/PolicyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePolicyReq'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete policy
      operationId: deletePolicy
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/PolicyId'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/policies/{policy_id}/revisions:
    post:
      summary: Publish policy revision
      operationId: publishPolicyRevision
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - $ref: '#/components/parameters/PolicyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishPolicyReq'
      responses:
        '201':
          description: Created — new immutable revision row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyRevision'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/policies/editor:
    post:
      summary: Create policy + publish revision from editor payload
      operationId: createPolicyFromEditor
      parameters:
      - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyEditorPublishReq'
      responses:
        '201':
          description: Created — new policy revision row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyRevision'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/tenants/{tenant_id}/commands:
    get:
      summary: List commands in tenant
      operationId: listCommands
      parameters:
      - $ref: '#/components/parameters/TenantId'
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
      - name: offset
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/CommandStatus'
      - name: target_device_id
        in: query
