port: 7880
rtc:
  tcp_port: 7881
  # Local Docker/WSL dev exposes a single UDP port in docker-compose.yml.
  # Do not set port_range_start/port_range_end together with udp_port.
  udp_port: 7882
  node_ip: 127.0.0.1
  use_external_ip: false
keys:
  dmsx-api-key: dmsx-api-secret-that-is-at-least-32-chars
logging:
  level: info
