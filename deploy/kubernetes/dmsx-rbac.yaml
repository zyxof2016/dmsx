apiVersion: v1
kind: ServiceAccount
metadata:
  name: dmsx-api
  namespace: dmsx
  labels:
    app.kubernetes.io/name: dmsx-api
    app.kubernetes.io/part-of: dmsx
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dmsx-api-read-config
  namespace: dmsx
  labels:
    app.kubernetes.io/name: dmsx-api
    app.kubernetes.io/part-of: dmsx
rules:
  # 默认情况下应用不需要访问 K8s API；如果未来需要读取 ConfigMap（feature flags 等），
  # 这里给出最小只读权限模板。无需时可删掉 Role/RoleBinding。
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dmsx-api-read-config
  namespace: dmsx
  labels:
    app.kubernetes.io/name: dmsx-api
    app.kubernetes.io/part-of: dmsx
subjects:
  - kind: ServiceAccount
    name: dmsx-api
    namespace: dmsx
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dmsx-api-read-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dmsx-device-gw
  namespace: dmsx
  labels:
    app.kubernetes.io/name: dmsx-device-gw
    app.kubernetes.io/part-of: dmsx
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dmsx-device-gw-read-config
  namespace: dmsx
  labels:
    app.kubernetes.io/name: dmsx-device-gw
    app.kubernetes.io/part-of: dmsx
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dmsx-device-gw-read-config
  namespace: dmsx
  labels:
    app.kubernetes.io/name: dmsx-device-gw
    app.kubernetes.io/part-of: dmsx
subjects:
  - kind: ServiceAccount
    name: dmsx-device-gw
    namespace: dmsx
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dmsx-device-gw-read-config

