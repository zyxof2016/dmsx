apiVersion: v1
kind: Secret
metadata:
  name: dmsx-api-secrets
  namespace: dmsx
  labels:
    app.kubernetes.io/name: dmsx-api
    app.kubernetes.io/part-of: dmsx
type: Opaque
stringData:
  # Postgres
  database_url: "postgres://dmsx:dmsx@postgres.dmsx.svc.cluster.local:5432/dmsx"

  # LiveKit
  livekit_api_key: "replace-me"
  livekit_api_secret: "replace-me-at-least-32-chars"

  # Optional: protect /metrics with a fixed bearer token.
  metrics_bearer: "replace-me"

